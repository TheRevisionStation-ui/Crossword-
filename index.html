<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossword – The Revision Station</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #00C5C8; --teal-dark: #00a0a3; --purple: #9B6FD4;
    --purple-light: #c4a0f0; --yellow: #FFD93D; --coral: #FF6B6B;
    --green: #4CAF50; --white: #FFFFFF; --dark: #1a1a2e;
    --shadow: 4px 4px 0px #1a1a2e; --shadow-lg: 6px 6px 0px #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Nunito", sans-serif;
    background: var(--teal);
    background-image: radial-gradient(circle at 15% 25%, rgba(255,255,255,0.15) 0%, transparent 40%),
                      radial-gradient(circle at 85% 75%, rgba(155,111,212,0.2) 0%, transparent 40%);
    min-height:100vh; padding:8px;
    display: flex; flex-direction: column; align-items: center;
  }
  .floaties { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:0; }
  .floaty { position:absolute; font-size:1.8rem; opacity:0.1; animation:float 6s ease-in-out infinite; }
  .floaty:nth-child(1){top:5%;left:3%;animation-delay:0s}
  .floaty:nth-child(2){top:15%;right:5%;animation-delay:1s}
  .floaty:nth-child(3){top:50%;left:2%;animation-delay:2s}
  .floaty:nth-child(4){top:70%;right:3%;animation-delay:0.5s}
  .floaty:nth-child(5){top:85%;left:8%;animation-delay:1.5s}
  @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-15px) rotate(5deg)} }
  .container { width:100%; max-width:1000px; position:relative; z-index:1; }
  .header { text-align:center; margin-bottom:16px; }
  .logo-img { width:60px; height:60px; object-fit:contain; filter:drop-shadow(3px 3px 0px rgba(0,0,0,0.3)); margin-bottom:3px; }
  .header h1 { font-family:"Fredoka One",cursive; font-size:clamp(1.2rem,3vw,1.6rem); color:var(--white); text-shadow:3px 3px 0px var(--dark); }
  .header p { color:var(--dark); font-size:0.9rem; font-weight:700; margin-top:3px; background:var(--yellow); display:inline-block; padding:3px 12px; border-radius:20px; border:2px solid var(--dark); }

  /* LEVEL SELECT */
  .Npx; box-shadow:var(--shadow-lg); }
  .level-screen h2 { font-family:"Fredoka One",cursive; font-size:1.8rem; color:var(--dark); margin-bottom:8px; }
  .level-screen p { color:#555; font-size:1rem; margin-bottom:20px; font-weight:600; }
  .level-buttons { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .level-btn { padding:16px 28px; font-family:"Fredoka One",cursive; font-size:1.3rem; border:3px solid var(--dark); border-radius:16px; cursor:pointer; box-shadow:var(--shadow-lg); transition:all 0.15s ease; color:var(--dark); min-width:160px; }
  .level-btn:hover { transform:translate(-2px,-2px); box-shadow:8px 8px 0px var(--dark); }
  .level-btn.beginner { background:#b8f0b8; }
  .level-btn.medium { background:#ffd6a5; }
  .level-btn.advanced { background:#ffb3c6; }

  /* GAME LAYOUT */
  .game-screen { display:none; }
  .game-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .level-badge { font-family:"Fredoka One",cursive; font-size:0.9rem; padding:5px 14px; border-radius:20px; border:2px solid var(--dark); box-shadow:2px 2px 0 var(--dark); }
  .level-badge.beginner { background:#b8f0b8; }
  .level-badge.medium { background:#ffd6a5; }
  .level-badge.advanced { background:#ffb3c6; }

  .game-layout { display:grid; grid-template-columns: auto 1fr; gap:16px; align-items:start; }
  @media(max-width:700px) { .game-layout { grid-template-columns:1fr; } }

  /* GRID */
  .grid-wrap { background:var(--white); border:3px solid var(--dark); border-radius:16px; padding:12px; box-shadow:var(--shadow-lg); overflow-x:auto; }
  .crossword-grid { display:inline-grid; gap:2px; }
  .cell {
    width:36px; height:36px; border:2px solid var(--dark); background:var(--white);
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  .cell.black { background:var(--dark); border-color:var(--dark); }
  .cell input {
    width:100%; height:100%; border:none; outline:none; text-align:center;
    font-family:"Fredoka One",cursive; font-size:1rem; color:var(--dark);
    background:transparent; text-transform:uppercase; cursor:pointer; padding:0;
  }
  .cell input:focus { background:#f0e8ff; }
  .cell.correct input { background:#b8f0b8 !important; color:#2d8a2d; }
  .cell.wrong input { background:#ffd6d6 !important; color:var(--coral); }
  .cell.highlighted input { background:#fff3cd; }
  .cell-num {
    position:absolute; top:1px; left:2px; font-size:0.5rem;
    font-weight:900; color:var(--purple); line-height:1; pointer-events:none;
  }

  /* CLUES */
  .clues-wrap { background:var(--white); border:3px solid var(--dark); border-radius:16px; padding:16px; box-shadow:var(--shadow-lg); max-height:500px; overflow-y:auto; }
  .clues-title { font-family:"Fredoka One",cursive; font-size:1.2rem; color:var(--dark); margin-bottom:10px; }
  .clue-section { margin-bottom:16px; }
  .clue-section h3 { font-family:"Fredoka One",cursive; font-size:1rem; color:var(--purple); margin-bottom:6px; border-bottom:2px solid var(--purple-light); padding-bottom:4px; }
  .clue-item { font-size:0.85rem; font-weight:700; padding:4px 6px; border-radius:6px; cursor:pointer; margin-bottom:3px; transition:background 0.15s; color:var(--dark); }
  .clue-item:hover { background:#f0e8ff; }
  .clue-item.active { background:var(--purple-light); }
  .clue-item.solved { color:#2d8a2d; text-decoration:line-through; opacity:0.6; }

  /* BUTTONS */
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  .btn {
    padding:10px 18px; font-family:"Fredoka One",cursive; font-size:1rem;
    border:2px solid var(--dark); border-radius:12px; cursor:pointer;
    box-shadow:var(--shadow); transition:all 0.15s; color:var(--dark);
  }
  .btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow-lg); }
  .btn-check { background:var(--green); color:var(--white); }
  .btn-reveal { background:var(--yellow); }
  .btn-new { background:var(--purple); color:var(--white); }
  .btn-level { background:var(--white); }

  /* LOADING */
  .loading { text-align:center; padding:40px; font-family:"Fredoka One",cursive; font-size:1.3rem; color:var(--purple); }
  .spinner { display:inline-block; width:40px; height:40px; border:4px solid var(--purple-light); border-top-color:var(--purple); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* COMPLETE */
  .complete-banner { background:var(--yellow); border:3px solid var(--dark); border-radius:16px; padding:16px; text-align:center; box-shadow:var(--shadow-lg); margin-top:12px; display:none; animation:fadeUp 0.4s ease; }
  .complete-banner.show { display:block; }
  .complete-banner h2 { font-family:"Fredoka One",cursive; font-size:1.5rem; color:var(--dark); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* SCORE */
  .score-area { font-family:"Fredoka One",cursive; font-size:1rem; color:var(--white); text-shadow:1px 1px 0 var(--dark); }
</style>
</head>

// ============================================================
// CROSSWORD ENGINE
// ============================================================
const GRID_SIZES = { beginner: 10, medium: 13, advanced: 15 };
const MIN_WORDS = { beginner: 8, medium: 12, advanced: 16 };

let currentLevel = '';
let currentPuzzle = null;
let selectedClue = null;

function startGame(level) {
  currentLevel = level;
  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  const badge = document.getElementById('levelBadge');
  badge.className = 'level-badge ' + level;
  badge.textContent = level === 'beginner' ? '🌱 Beginner' : level === 'medium' ? '📘 Medium' : '🔥 Advanced';
  newPuzzle();
}

function changeLevel() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('levelScreen').style.display = 'block';
}

function newPuzzle() {
  document.getElementById('loadingDiv').style.display = 'block';
  document.getElementById('gameLayout').style.display = 'none';
  document.getElementById('completeBanner').classList.remove('show');
  setTimeout(() => {
    try {
      currentPuzzle = generateCrossword(currentLevel);
      renderPuzzle(currentPuzzle);
      document.getElementById('loadingDiv').style.display = 'none';
      document.getElementById('gameLayout').style.display = 'grid';
    } catch(e) {
      // retry
      setTimeout(() => {
        currentPuzzle = generateCrossword(currentLevel);
        renderPuzzle(currentPuzzle);
        document.getElementById('loadingDiv').style.display = 'none';
        document.getElementById('gameLayout').style.display = 'grid';
      }, 500);
    }
  }, 100);
}

function generateCrossword(level) {
  const size = GRID_SIZES[level];
  const minWords = MIN_WORDS[level];
  const bank = [...wordBanks[level]].sort(() => Math.random() - 0.5);

  // Only use words that fit in the grid (no spaces for crossword, filter short/long)
  const candidates = bank
    .filter(([w]) => !w.includes(' ') && w.length >= 3 && w.length <= size - 2)
    .slice(0, 60);

  for (let attempt = 0; attempt < 30; attempt++) {
    const shuffled = [...candidates].sort(() => Math.random() - 0.5);
    const result = tryBuild(shuffled, size, minWords);
    if (result && result.placed.length >= minWords) return result;
  }

  // Fallback with fewer words
  const shuffled = [...candidates].sort(() => Math.random() - 0.5);
  return tryBuild(shuffled, size, 6) || tryBuild(shuffled.slice(0, 20), size, 4);
}

function tryBuild(words, size, minWords) {
  const grid = Array.from({length: size}, () => Array(size).fill(null));
  const placed = [];

  function canPlace(word, row, col, dir) {
    const dr = dir === 'down' ? 1 : 0;
    const dc = dir === 'across' ? 1 : 0;
    // Check bounds
    if (row + dr * (word.length - 1) >= size) return false;
    if (col + dc * (word.length - 1) >= size) return false;
    // Check before start
    const pr = row - dr, pc = col - dc;
    if (pr >= 0 && pc >= 0 && grid[pr][pc] !== null) return false;
    // Check after end
    const er = row + dr * word.length, ec = col + dc * word.length;
    if (er < size && ec < size && grid[er][ec] !== null) return false;

    let intersections = 0;
    for (let i = 0; i < word.length; i++) {
      const r = row + dr * i, c = col + dc * i;
      const cell = grid[r][c];
      if (cell === null) {
        // Check perpendicular neighbours
        const perpr = r + dc, perpc = c + dr;
        const perpr2 = r - dc, perpc2 = c - dr;
        if (perpr < size && perpc < size && perpr >= 0 && perpc >= 0 && grid[perpr][perpc] !== null) return false;
        if (perpr2 < size && perpc2 < size && perpr2 >= 0 && perpc2 >= 0 && grid[perpr2][perpc2] !== null) return false;
      } else if (cell === word[i]) {
        intersections++;
      } else {
        return false;
      }
    }
    if (placed.length > 0 && intersections === 0) return false;
    return true;
  }

  function placeWord(word, row, col, dir, clue) {
    const dr = dir === 'down' ? 1 : 0;
    const dc = dir === 'across' ? 1 : 0;
    for (let i = 0; i < word.length; i++) {
      grid[row + dr * i][col + dc * i] = word[i];
    }
    placed.push({ word, clue, row, col, dir });
  }

  // Place first word in middle
  if (words.length === 0) return null;
  const first = words[0];
  const midRow = Math.floor(size / 2);
  const midCol = Math.floor((size - first[0].length) / 2);
  placeWord(first[0], midRow, midCol, 'across', first[1]);

  // Try to place remaining words
  for (let wi = 1; wi < words.length && placed.length < 25; wi++) {
    const [word, clue] = words[wi];
    let bestPlace = null;

    // Try to intersect with already placed words
    for (const existing of placed) {
      for (let ei = 0; ei < existing.word.length; ei++) {
        const existChar = existing.word[ei];
        for (let wi2 = 0; wi2 < word.length; wi2++) {
          if (word[wi2] !== existChar) continue;
          // Try across: existing is down, new is across
          if (existing.dir === 'down') {
            const row = existing.row + ei;
            const col = existing.col - wi2;
            if (col >= 0 && canPlace(word, row, col, 'across')) {
              bestPlace = { row, col, dir: 'across' };
              break;
            }
          }
          // Try down: existing is across, new is down
          if (existing.dir === 'across') {
            const row = existing.row - wi2;
            const col = existing.col + ei;
            if (row >= 0 && canPlace(word, row, col, 'down')) {
              bestPlace = { row, col, dir: 'down' };
              break;
            }
          }
        }
        if (bestPlace) break;
      }
      if (bestPlace) break;
    }

    if (bestPlace) {
      placeWord(word, bestPlace.row, bestPlace.col, bestPlace.dir, clue);
    }
  }

  if (placed.length < minWords) return null;

  // Number the words
  const cellNums = {};
  let num = 1;
  const acrossWords = placed.filter(p => p.dir === 'across').sort((a,b) => a.row - b.row || a.col - b.col);
  const downWords = placed.filter(p => p.dir === 'down').sort((a,b) => a.row - b.row || a.col - b.col);

  // Collect all start positions and assign numbers
  const startPositions = {};
  [...acrossWords, ...downWords].forEach(p => {
    const key = `${p.row},${p.col}`;
    if (!startPositions[key]) startPositions[key] = num++;
    p.number = startPositions[key];
  });

  return { grid, placed, acrossWords, downWords, size };
}

function renderPuzzle(puzzle) {
  if (!puzzle) return;
  const { grid, acrossWords, downWords, size } = puzzle;

  // Build number map
  const numMap = {};
  [...acrossWords, ...downWords].forEach(p => {
    numMap[`${p.row},${p.col}`] = p.number;
  });

  // Render grid
  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${size}, 36px)`;
  gridEl.innerHTML = '';

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      if (grid[r][c] === null) {
        cell.classList.add('black');
      } else {
        const num = numMap[`${r},${c}`];
        if (num) {
          const span = document.createElement('span');
          span.className = 'cell-num';
          span.textContent = num;
          cell.appendChild(span);
        }
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 1;
        input.dataset.answer = grid[r][c];
        input.addEventListener('input', (e) => {
          e.target.value = e.target.value.toUpperCase().slice(-1);
          cell.classList.remove('correct','wrong');
          checkComplete();
          // Move to next
          moveToNext(r, c);
        });
        input.addEventListener('focus', () => highlightWord(r, c));
        input.addEventListener('keydown', handleKeyNav);
        cell.appendChild(input);
      }
      gridEl.appendChild(cell);
    }
  }

  // Render clues
  const acrossDiv = document.getElementById('acrossClues');
  const downDiv = document.getElementById('downClues');
  acrossDiv.innerHTML = '';
  downDiv.innerHTML = '';

  acrossWords.forEach(p => {
    const div = document.createElement('div');
    div.className = 'clue-item';
    div.textContent = `${p.number}. ${p.clue} (${p.word.length})`;
    div.dataset.row = p.row; div.dataset.col = p.col; div.dataset.dir = 'across';
    div.id = `clue-across-${p.number}`;
    div.onclick = () => { focusWord(p); };
    acrossDiv.appendChild(div);
  });

  downWords.forEach(p => {
    const div = document.createElement('div');
    div.className = 'clue-item';
    div.textContent = `${p.number}. ${p.clue} (${p.word.length})`;
    div.dataset.row = p.row; div.dataset.col = p.col; div.dataset.dir = 'down';
    div.id = `clue-down-${p.number}`;
    div.onclick = () => { focusWord(p); };
    downDiv.appendChild(div);
  });

  document.getElementById('solvedCount').textContent = '0';
  document.getElementById('totalCount').textContent = puzzle.placed.length;
  updateSolvedCount();
}

function getCell(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function focusWord(p) {
  selectedClue = p;
  highlightWord(p.row, p.col, p.dir);
  const cell = getCell(p.row, p.col);
  if (cell) { const inp = cell.querySelector('input'); if(inp) inp.focus(); }
  // Scroll clue into view
  const clueEl = document.getElementById(`clue-${p.dir}-${p.number}`);
  if (clueEl) clueEl.scrollIntoView({ block: 'nearest' });
}

function highlightWord(r, c, preferDir) {
  // Clear all highlights
  document.querySelectorAll('.cell.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('.clue-item.active').forEach(el => el.classList.remove('active'));

  // Find which word(s) this cell belongs to
  const words = currentPuzzle.placed.filter(p => {
    if (p.dir === 'across') return p.row === r && c >= p.col && c < p.col + p.word.length;
    if (p.dir === 'down') return p.col === c && r >= p.row && r < p.row + p.word.length;
    return false;
  });

  if (words.length === 0) return;
  let chosen = words[0];
  if (preferDir) chosen = words.find(w => w.dir === preferDir) || words[0];
  if (selectedClue && words.includes(selectedClue)) chosen = selectedClue;
  selectedClue = chosen;

  // Highlight cells
  const dr = chosen.dir === 'down' ? 1 : 0;
  const dc = chosen.dir === 'across' ? 1 : 0;
  for (let i = 0; i < chosen.word.length; i++) {
    const cell = getCell(chosen.row + dr * i, chosen.col + dc * i);
    if (cell) cell.classList.add('highlighted');
  }
  // Highlight clue
  const clueEl = document.getElementById(`clue-${chosen.dir}-${chosen.number}`);
  if (clueEl) clueEl.classList.add('active');
}

function moveToNext(r, c) {
  if (!selectedClue) return;
  const dr = selectedClue.dir === 'down' ? 1 : 0;
  const dc = selectedClue.dir === 'across' ? 1 : 0;
  const nr = r + dr, nc = c + dc;
  const next = getCell(nr, nc);
  if (next && !next.classList.contains('black')) {
    const inp = next.querySelector('input');
    if (inp) inp.focus();
  }
}

function handleKeyNav(e) {
  const cell = e.target.closest('.cell');
  const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
  if (e.key === 'Backspace' && e.target.value === '') {
    if (!selectedClue) return;
    const dr = selectedClue.dir === 'down' ? 1 : 0;
    const dc = selectedClue.dir === 'across' ? 1 : 0;
    const prev = getCell(r - dr, c - dc);
    if (prev && !prev.classList.contains('black')) { const inp = prev.querySelector('input'); if(inp){inp.focus();inp.value='';} }
    e.preventDefault();
  }
  if (e.key === 'ArrowRight') { const next = getCell(r, c+1); if(next&&!next.classList.contains('black')){next.querySelector('input')?.focus();} }
  if (e.key === 'ArrowLeft') { const prev = getCell(r, c-1); if(prev&&!prev.classList.contains('black')){prev.querySelector('input')?.focus();} }
  if (e.key === 'ArrowDown') { const next = getCell(r+1, c); if(next&&!next.classList.contains('black')){next.querySelector('input')?.focus();} }
  if (e.key === 'ArrowUp') { const prev = getCell(r-1, c); if(prev&&!prev.classList.contains('black')){prev.querySelector('input')?.focus();} }
}

function checkAnswers() {
  document.querySelectorAll('.cell:not(.black)').forEach(cell => {
    const inp = cell.querySelector('input');
    if (!inp || inp.value === '') return;
    if (inp.value.toUpperCase() === inp.dataset.answer.toUpperCase()) {
      cell.classList.add('correct'); cell.classList.remove('wrong');
    } else {
      cell.classList.add('wrong'); cell.classList.remove('correct');
    }
  });
  updateSolvedCount();
}

function revealAll() {
  document.querySelectorAll('.cell:not(.black)').forEach(cell => {
    const inp = cell.querySelector('input');
    if (inp) { inp.value = inp.dataset.answer; cell.classList.add('correct'); cell.classList.remove('wrong'); }
  });
  updateSolvedCount();
  checkComplete();
}

function updateSolvedCount() {
  if (!currentPuzzle) return;
  let solved = 0;
  currentPuzzle.placed.forEach(p => {
    const dr = p.dir === 'down' ? 1 : 0;
    const dc = p.dir === 'across' ? 1 : 0;
    const complete = p.word.split('').every((ch, i) => {
      const cell = getCell(p.row + dr * i, p.col + dc * i);
      const inp = cell?.querySelector('input');
      return inp && inp.value.toUpperCase() === ch.toUpperCase();
    });
    if (complete) {
      solved++;
      const clueEl = document.getElementById(`clue-${p.dir}-${p.number}`);
      if (clueEl) clueEl.classList.add('solved');
    }
  });
  document.getElementById('solvedCount').textContent = solved;
  document.getElementById('totalCount').textContent = currentPuzzle.placed.length;
}

function checkComplete() {
  updateSolvedCount();
  if (!currentPuzzle) return;
  const allCorrect = Array.from(document.querySelectorAll('.cell:not(.black) input'))
    .every(inp => inp.value.toUpperCase() === inp.dataset.answer.toUpperCase());
  if (allCorrect && document.querySelectorAll('.cell:not(.black) input').length > 0) {
    document.getElementById('completeBanner').classList.add('show');
  }
}
